version: "3.9"

services:
  rustynail:
    build:
      # Context is the parent directory so the agenkit local path dep resolves
      context: ..
      dockerfile: rustynail/Dockerfile
    image: rustynail:local
    ports:
      - "8080:8080"
    environment:
      # Required
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Optional — WhatsApp
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}

      # Optional — Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}

      # Optional — Slack
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}

      # Optional — Tools
      TOOLS_ENABLED: ${TOOLS_ENABLED:-false}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TOOLS_FILESYSTEM_ROOT: ${TOOLS_FILESYSTEM_ROOT:-}

      # Optional — Agents
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-sonnet-20241022}
      AGENTS_PLANNING_ENABLED: ${AGENTS_PLANNING_ENABLED:-false}

      # Optional — OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-rustynail}

      # Optional — Dashboard auth
      DASHBOARD_AUTH_PASSWORD: ${DASHBOARD_AUTH_PASSWORD:-}

      # Logging
      RUST_LOG: ${RUST_LOG:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
