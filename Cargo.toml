[package]
name = "rustynail"
version = "0.1.0"
edition = "2021"
authors = ["Scott Friedman"]
description = "RustyNail - OpenClaw clone in Rust using Agenkit"
license = "MIT"

[dependencies]
# Agenkit - local path to Rust implementation
agenkit = { path = "../agenkit/agenkit-rust" }

# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Discord integration
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "rustls_backend", "model", "cache"] }

# HTTP server
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["trace", "cors"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging and observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Configuration
config = "0.14"
dotenvy = "0.15"

# Utilities
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
mockall = "0.12"

[[bin]]
name = "rustynail"
path = "src/main.rs"
