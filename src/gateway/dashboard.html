<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RustyNail Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: #a78bfa; letter-spacing: -0.02em; }
  header h1 span { color: #60a5fa; }
  #last-updated { font-size: 0.75rem; color: #64748b; }
  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* Stat cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 0.75rem; padding: 1.25rem; }
  .stat-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .stat-card .value { font-size: 2rem; font-weight: 700; color: #f8fafc; }
  .stat-card .sub { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }

  /* Tables */
  .section { margin-bottom: 2rem; }
  .section h2 { font-size: 1rem; font-weight: 600; color: #cbd5e1; margin-bottom: 0.75rem; border-bottom: 1px solid #2d3148; padding-bottom: 0.5rem; }
  table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 0.75rem; overflow: hidden; font-size: 0.875rem; }
  th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; background: #13151e; border-bottom: 1px solid #2d3148; }
  td { padding: 0.625rem 1rem; border-bottom: 1px solid #1e2130; color: #cbd5e1; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2130; }

  /* Badges */
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-healthy, .badge-ok { background: #14532d; color: #4ade80; }
  .badge-degraded { background: #713f12; color: #fbbf24; }
  .badge-unhealthy, .badge-error { background: #7f1d1d; color: #f87171; }
  .badge-inbound { background: #1e3a5f; color: #60a5fa; }
  .badge-outbound { background: #14532d; color: #4ade80; }
  .badge-running { background: #14532d; color: #4ade80; }
  .badge-stopped { background: #1e1b22; color: #6b7280; }

  .empty-row td { color: #475569; font-style: italic; text-align: center; padding: 2rem; }
</style>
</head>
<body>
<header>
  <h1>Rusty<span>Nail</span> Dashboard</h1>
  <div id="last-updated">Loading…</div>
</header>
<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Messages In</div>
      <div class="value" id="stat-in">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Messages Out</div>
      <div class="value" id="stat-out">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Users</div>
      <div class="value" id="stat-users">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Uptime</div>
      <div class="value" id="stat-uptime">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Msg Rate</div>
      <div class="value" id="stat-rate">—</div>
      <div class="sub">per minute</div>
    </div>
  </div>

  <div class="section">
    <h2>Channels</h2>
    <table>
      <thead><tr><th>Name</th><th>ID</th><th>Health</th><th>Status</th></tr></thead>
      <tbody id="channels-body"><tr class="empty-row"><td colspan="4">Loading…</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Recent Messages</h2>
    <table>
      <thead><tr><th>Time</th><th>Direction</th><th>Channel</th><th>User</th><th>Preview</th></tr></thead>
      <tbody id="messages-body"><tr class="empty-row"><td colspan="5">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<script>
function fmtUptime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0 ? `${h}h ${m}m ${sec}s` : m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function fmtTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString();
  } catch { return iso; }
}

function healthBadge(h) {
  const cls = h.toLowerCase().includes('healthy') ? 'badge-healthy'
            : h.toLowerCase().includes('degraded') ? 'badge-degraded'
            : 'badge-error';
  return `<span class="badge ${cls}">${h}</span>`;
}

async function refresh() {
  try {
    const resp = await fetch('/dashboard/data');
    if (!resp.ok) { console.error('Dashboard data fetch failed', resp.status); return; }
    const d = await resp.json();

    document.getElementById('stat-in').textContent = d.messages_in.toLocaleString();
    document.getElementById('stat-out').textContent = d.messages_out.toLocaleString();
    document.getElementById('stat-users').textContent = d.active_users.toLocaleString();
    document.getElementById('stat-uptime').textContent = fmtUptime(d.uptime_seconds);

    const uptimeMin = Math.max(1, d.uptime_seconds / 60);
    const rate = (d.messages_in / uptimeMin).toFixed(2);
    document.getElementById('stat-rate').textContent = rate;

    // Channels table
    const cb = document.getElementById('channels-body');
    if (d.channels.length === 0) {
      cb.innerHTML = '<tr class="empty-row"><td colspan="4">No channels registered</td></tr>';
    } else {
      cb.innerHTML = d.channels.map(ch => `
        <tr>
          <td>${ch.name}</td>
          <td><code>${ch.id}</code></td>
          <td>${healthBadge(ch.health)}</td>
          <td><span class="badge ${ch.running ? 'badge-running' : 'badge-stopped'}">${ch.running ? 'Running' : 'Stopped'}</span></td>
        </tr>`).join('');
    }

    // Recent messages table
    const mb = document.getElementById('messages-body');
    if (d.recent_messages.length === 0) {
      mb.innerHTML = '<tr class="empty-row"><td colspan="5">No messages yet</td></tr>';
    } else {
      mb.innerHTML = d.recent_messages.map(m => `
        <tr>
          <td>${fmtTime(m.timestamp)}</td>
          <td><span class="badge badge-${m.direction}">${m.direction}</span></td>
          <td>${m.channel_id}</td>
          <td>${m.user_id}</td>
          <td>${m.content_preview}</td>
        </tr>`).join('');
    }

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error('Dashboard refresh error:', e);
    document.getElementById('last-updated').textContent = 'Error refreshing data';
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
