apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rustynail.fullname" . }}
  labels:
    {{- include "rustynail.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- if .Values.secrets.discordBotToken }}
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | quote }}
  {{- end }}
  {{- if .Values.secrets.gatewayApiToken }}
  GATEWAY_API_TOKEN: {{ .Values.secrets.gatewayApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.teamsAppId }}
  TEAMS_APP_ID: {{ .Values.secrets.teamsAppId | quote }}
  {{- end }}
  {{- if .Values.secrets.teamsAppPassword }}
  TEAMS_APP_PASSWORD: {{ .Values.secrets.teamsAppPassword | quote }}
  {{- end }}
