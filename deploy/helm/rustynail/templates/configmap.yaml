apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rustynail.fullname" . }}
  labels:
    {{- include "rustynail.labels" . | nindent 4 }}
data:
  config.yaml: |
    gateway:
      http_port: {{ .Values.config.httpPort }}
      websocket_port: {{ .Values.config.websocketPort }}
      log_level: {{ .Values.config.logLevel }}
    channels: {}
    agents:
      llm_provider: anthropic
      llm_model: claude-3-5-sonnet-20241022
      api_key: ${ANTHROPIC_API_KEY}
    memory:
      backend: {{ .Values.memory.backend }}
      {{- if .Values.memory.redisUrl }}
      redis_url: {{ .Values.memory.redisUrl }}
      {{- end }}
    tools:
      enabled: {{ .Values.tools.enabled }}
      {{- if .Values.tools.filesystemRoot }}
      filesystem_root: {{ .Values.tools.filesystemRoot }}
      {{- end }}
    skills:
      enabled: {{ .Values.skills.enabled }}
      max_active: {{ .Values.skills.maxActive }}
      paths:
        {{- range .Values.skills.paths }}
        - {{ . }}
        {{- end }}
